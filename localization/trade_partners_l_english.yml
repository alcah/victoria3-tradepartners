 TRADE_PARTNERS_OTHER_MARKET_EXPORTS_TOOLTIP: "#white #b @market_exports! [Market.GetName] Exports to the [GetPlayer.GetMarket.GetOwner.GetFlagTextIcon] [GetPlayer.GetMarket.GetName]\n#!#!Amount: [Market.MakeScope.ScriptValue('trade_partners_total_exports_to_target')|v0]"
