 TRADE_PARTNERS_OTHER_MARKET_EXPORTS_TOOLTIP: "#white #b @market_exports! Рынок [Market.GetName] экспортирует товары на рынок [GetPlayer.GetMarket.GetOwner.GetFlagTextIcon] [GetPlayer.GetMarket.GetName]\n#!#!Количество: [TradePartnersGetExportsTo(Market, GetPlayer.GetMarket)|v0]"
