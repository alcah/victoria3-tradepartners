 TRADE_PARTNERS_EXPORT_PARTNERS_TITLE: "#white #b @market_exports! Рынок [Market.GetName] экспортирует товары на рынок [Scope.GetMarket.GetOwner.GetFlagTextIcon] [Scope.GetMarket.GetName]\n#!#!Количество: [TradePartnersGetExportsTo(Market, Scope.GetMarket)|v0]"
 TRADE_PARTNERS_EXPORTED_GOODS_TITLE: "Экспортируемые товары:"
