 TRADE_PARTNERS_MARKET_TOOLTIP_EXPORT: "@market_exports! Экспортирует [TradePartnersGetExportsTo(Market, GetPlayer.GetMarket)|v0] товаров на рынок [GetPlayer.GetMarket.GetOwner.GetFlagTextIcon] [GetPlayer.GetMarket.GetName]"
